name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# Opt into Node.js 24 runtime for JavaScript actions before the 2026-09-16
# runner cutover. Cheaper than bumping every action's version pin and gets
# us off the deprecation warning on every run.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-roadmap:
    name: Validate ROADMAP cited paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Assert every [x] cited path exists (Phase 4.6.9)
        # Walks each `- [x]` ROADMAP entry, extracts every backtick-
        # quoted path-shaped string ending in a tracked extension,
        # asserts each resolves on disk (or matches a basename
        # somewhere in the tree). Catches doc/code drift before it
        # ships.
        run: python tests/roadmap/check_cited_paths.py

      - name: Assert Status-snapshot heading is fresh (Phase 4.6.9)
        # Compares the date in `### Status snapshot (YYYY-MM-DD)`
        # against the latest commit on ROADMAP.md. >30 days fails.
        # Forces the snapshot table to track reality without
        # demanding an update on every unrelated commit.
        run: python tests/roadmap/check_snapshot_freshness.py

  validate-typescript:
    name: Validate TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TypeScript + project deps
        run: |
          cd implementations/typescript
          npm install

      - name: Type check
        run: |
          cd implementations/typescript
          npx tsc --noEmit

  test-typescript:
    name: TypeScript Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test deps (vitest + jszip)
        run: |
          cd implementations/typescript
          npm install

      - name: Run unit tests
        run: |
          cd implementations/typescript
          npm test

  validate-python:
    name: Validate Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check
        run: python -m py_compile implementations/python/mdx_format.py

      - name: Run example generator
        run: |
          cd implementations/python
          python mdx_format.py

      - name: Verify output
        run: |
          cd implementations/python
          test -f example-document.mdx
          unzip -t example-document.mdx

      - name: Test deprecation contract
        run: python tests/python/test_deprecation.py

  validate-examples:
    name: Validate Example Documents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify example MDX structure
        run: |
          cd examples
          for mdx in *.mdx; do
            echo "Validating $mdx..."
            unzip -t "$mdx"
            unzip -p "$mdx" manifest.json | python -m json.tool > /dev/null
            unzip -p "$mdx" document.md > /dev/null
            echo "$mdx is valid"
          done

  validate-v11-examples:
    name: Validate v1.1 Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate v1.1 examples
        run: |
          cd implementations/python
          python create_v11_examples.py

      - name: Verify v1.1 examples
        run: |
          cd examples
          for mdx in alignment-*.mdx technical-doc.mdx; do
            if [ -f "$mdx" ]; then
              echo "Validating v1.1 example: $mdx..."
              unzip -t "$mdx"
              # Check for v1.1 manifest version
              version=$(unzip -p "$mdx" manifest.json | python -c "import sys,json; print(json.load(sys.stdin).get('mdx_version', '1.0.0'))")
              echo "  MDX Version: $version"
              # Verify has alignment extensions
              extensions=$(unzip -p "$mdx" manifest.json | python -c "import sys,json; exts=json.load(sys.stdin).get('content',{}).get('extensions',[]); print(','.join(exts))")
              echo "  Extensions: $extensions"
              echo "$mdx is valid"
            fi
          done

      - name: Verify alignment test files
        run: |
          cd tests/alignment
          for md in *.md; do
            echo "Checking test file: $md"
            test -f "$md"
          done
          echo "All test files present"

      - name: Run alignment fixture validator
        run: python tests/alignment/validate_fixtures.py

      - name: Run reference alignment parser conformance tests
        run: python tests/alignment/test_parser.py

  validate-v20-examples:
    name: Validate v2.0 Examples and Parser
    runs-on: ubuntu-latest
    needs: validate-json-schema
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Generate comprehensive v2.0 example
        run: python implementations/python/create_v20_example.py

      - name: Validate comprehensive v2.0 manifest against v2.0 schema
        run: |
          unzip -p examples/v2/comprehensive.mdx manifest.json > /tmp/v2_manifest.json
          ajv validate -s spec/manifest-v2.schema.json -d /tmp/v2_manifest.json --spec=draft2020 -c ajv-formats

      - name: Validate v2.0 reference profile JSONs parse
        run: |
          python -c "import json; [print(p, '→', json.load(open(p))['name']) for p in ['spec/profiles/scientific-paper-v1.json', 'spec/profiles/api-reference-v1.json']]"

      - name: Install Python test dependencies (lark, hypothesis)
        run: python -m pip install lark hypothesis

      - name: Validate v2.0 + Advanced profile JSONs parse
        run: |
          python -c "import json; [print(p, '->', json.load(open(p))['name']) for p in ['spec/profiles/scientific-paper-v1.json', 'spec/profiles/api-reference-v1.json', 'spec/profiles/mdz-advanced-v1.json']]"

      - name: Run v2.0 parser conformance tests (legacy regex parser)
        run: python tests/v2.0/test_parser_v20.py

      - name: Run Lark parser parity + v2.1 tests
        run: python tests/v2.0/test_lark_parser.py

      - name: Run conformance test suite (positive/negative/roundtrip/edge)
        run: python tests/conformance/run_conformance.py

      - name: Run property-based tests (hypothesis, 500 cases per property)
        run: python tests/property/test_parser_properties.py

      - name: Verify archive ordering (§10.2)
        run: |
          first=$(unzip -l examples/v2/comprehensive.mdx | awk 'NR==4 {print $4}')
          if [ "$first" != "manifest.json" ]; then
            echo "ERROR: First entry is '$first', expected 'manifest.json' per §10.2"
            exit 1
          fi
          echo "Archive ordering OK (manifest.json is first entry)"

  validate-cli:
    name: Validate CLI Tool
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python (for dual-extension integration test)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CLI dependencies
        run: |
          cd cli
          npm install

      - name: Test CLI commands
        run: |
          cd cli
          # Test info command
          node src/index.js info ../examples/example-document.mdx
          # Test validate command
          node src/index.js validate ../examples/example-document.mdx
          # Test extract command
          node src/index.js extract ../examples/example-document.mdx -f
          # Verify extracted files
          test -f example-document-extracted/manifest.json
          test -f example-document-extracted/document.md

      - name: Test CLI accepts both .mdz and .mdx (backward-compat)
        run: python tests/cli/test_cli_dual_extension.py

      - name: Py↔TS cross-impl parity (Phase 1.3)
        run: python tests/parity/py_ts_roundtrip.py

      - name: Test verify command (signature chain + integrity)
        run: |
          cd cli
          node --test test/verify.test.js

      - name: Test import-epub command (Phase 2.4 reverse-direction round-trip)
        run: |
          cd cli
          node --test test/import-epub.test.js

      - name: Test snapshot command (Phase 4.5 delta-snapshots-v1)
        run: |
          cd cli
          node --test test/snapshots.test.js

      - name: Run delta-snapshots-v1 conformance fixtures
        run: node tests/conformance/history/run_history_conformance.js

      - name: Install root dependencies (adm-zip for cross-package runners)
        # Phase 4.6.9: adm-zip is hoisted to the workspace root so
        # tests/conformance/integrity/run_integrity_conformance.js
        # can resolve it without reaching into cli/node_modules.
        run: npm install --no-audit --no-fund

      - name: Run archive-level integrity fixtures (Phase 3.2)
        run: node tests/conformance/integrity/run_integrity_conformance.js

  test-phase-2-3:
    name: Phase 2/3 Tests (viewer sanitizer + accessibility)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install workspace deps
        run: npm install --ignore-scripts

      - name: Run viewer sanitizer XSS tests
        run: |
          cd packages/mdz-viewer
          npx vitest run src/render.test.ts

      - name: Type-check viewer package
        run: |
          cd packages/mdz-viewer
          npx tsc --noEmit

      - name: Type-check hosted worker
        run: |
          cd packages/mdz-viewer-hosted
          npx tsc --noEmit

      - name: Run hosted worker tests (Phase 2.2)
        run: |
          cd packages/mdz-viewer-hosted
          npx vitest run

      - name: Run accessibility structural checks
        run: python tests/accessibility/run_accessibility.py

  validate-json-schema:
    name: Validate JSON Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Validate v1.1 schema syntax
        run: ajv compile -s spec/manifest.schema.json --spec=draft2020 -c ajv-formats

      - name: Validate v2.0 schema syntax
        run: ajv compile -s spec/manifest-v2.schema.json --spec=draft2020 -c ajv-formats

      - name: Validate example manifest against v1.1 schema
        # No `|| echo` fallback — a validation failure here is a real
        # regression in either the schema or the example, and must
        # break CI so it can't slip into a release.
        run: |
          cd examples
          unzip -p example-document.mdx manifest.json > manifest.json
          ajv validate -s ../spec/manifest.schema.json -d manifest.json --spec=draft2020 -c ajv-formats

      - name: Validate example manifest against v2.0 schema (backward compat)
        run: |
          cd examples
          unzip -p example-document.mdx manifest.json > manifest.json
          ajv validate -s ../spec/manifest-v2.schema.json -d manifest.json --spec=draft2020 -c ajv-formats

      - name: Run schema negative-rejection tests
        # These assert that invalid manifests are REJECTED. Without
        # them, a schema regression that accidentally relaxed
        # constraints would pass CI unnoticed (all positive examples
        # would still validate).
        run: python tests/v2.0/test_schema_negatives.py

  validate-rust-binding:
    name: Validate Rust Binding (Phase 4.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (MSRV 1.85)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.85'

      - name: Cargo build (default features)
        # `--locked` not used — lock file is gitignored during alpha while
        # dependency minors churn. CI re-resolves each run.
        run: |
          cd bindings/rust
          cargo build

      - name: Cargo test (default features)
        run: |
          cd bindings/rust
          cargo test

      - name: Cargo build (no default features)
        # Ensures the FeatureDisabled runtime path still compiles when
        # the `verify` feature is off — catches accidental hard deps.
        run: |
          cd bindings/rust
          cargo build --no-default-features

      - name: Cargo test (no default features)
        # Exercises the FeatureDisabled runtime path in tests.
        run: |
          cd bindings/rust
          cargo test --no-default-features

      - name: Cross-impl parity harness (Rust parses TS-written archive)
        run: |
          python tests/parity/rust_ts_manifest_parity.py examples/example-document.mdx

  validate-pandoc-filter:
    name: Validate Pandoc Lua Filter (Phase 4.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc 3.x
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          pandoc --version | head -1

      - name: Smoke-test filter loads
        # Running pandoc with an empty input + the filter must exit 0
        # — any Lua parse error in the filter surfaces here.
        run: |
          echo "" | pandoc --lua-filter=integrations/pandoc/mdz-filter.lua \
            --from=markdown --to=markdown

      - name: Run golden-output fixtures
        run: bash integrations/pandoc/tests/run.sh

  validate-vscode-extension:
    name: Validate VS Code Extension (Phase 4.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate package.json
        run: |
          cd integrations/vscode
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"

      - name: Syntax-check extension.js + helpers.js
        run: |
          node --check integrations/vscode/src/extension.js
          node --check integrations/vscode/src/helpers.js

      - name: Validate TextMate grammar JSON
        run: |
          cd integrations/vscode
          node -e "JSON.parse(require('fs').readFileSync('syntaxes/mdz.tmLanguage.json', 'utf8'))"

      - name: Run helper unit tests
        run: node --test integrations/vscode/test/*.test.js

  validate-editor-desktop:
    name: Validate Editor Desktop (Phase 2.3a.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install editor deps (skip Electron chrome blob)
        # ELECTRON_SKIP_BINARY_DOWNLOAD=1 keeps CI fast — npm pulls
        # `electron`'s JS surface (~10 MB) without the chrome binary
        # (~200 MB). We DON'T use `--omit=optional` because npm's
        # optional-deps handling has a known bug
        # (https://github.com/npm/cli/issues/4828) where rollup's
        # platform-specific native binaries (which npm marks as
        # optional) get skipped, breaking vitest.
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: |
          cd editor-desktop
          npm install --no-audit --no-fund

      - name: Type-check the testable core (excludes Electron-deps)
        run: |
          cd editor-desktop
          npx tsc --noEmit -p tsconfig.test.json

      - name: Run archive-io unit tests
        run: |
          cd editor-desktop
          npx vitest run

  validate-browser-extension:
    name: Validate Browser Extension (Phase 2.5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies (adm-zip lives at workspace root)
        run: npm install --no-audit --no-fund

      - name: Validate manifest + run build determinism tests
        run: node --test browser-extension/test/manifest.test.js browser-extension/test/build.test.js

      - name: Build extension zip + verify reproducibility (Phase 4.6.8)
        # Builds the .zip, then re-builds it; SHA-256 of both runs MUST
        # match. AMO reviewers verify the published artifact by SHA, so
        # non-determinism is a release blocker. We extract just the
        # `sha256 …` line — the `built` line includes the output path,
        # which differs by design between the two runs.
        run: |
          node browser-extension/build.js --output /tmp/build-a.zip --print-sha256 \
            | awk '/^sha256/ {print $2}' > /tmp/sha-a.txt
          node browser-extension/build.js --output /tmp/build-b.zip --print-sha256 \
            | awk '/^sha256/ {print $2}' > /tmp/sha-b.txt
          diff /tmp/sha-a.txt /tmp/sha-b.txt
          echo "Reproducible-build SHA-256 verified: $(cat /tmp/sha-a.txt)"

      - name: Verify reproducible-build doc reflects current state
        # Smoke check: REPRODUCIBLE_BUILD.md must mention manifest.json
        # and the build entrypoint. If a maintainer rewrites the doc,
        # they MUST keep these references — this catches stale docs.
        run: |
          grep -q 'manifest.json' browser-extension/REPRODUCIBLE_BUILD.md
          grep -qE 'zip|build\.js' browser-extension/REPRODUCIBLE_BUILD.md

  validate-corpus-fetcher:
    name: Validate Corpus Fetcher (Phase 4.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Syntax check
        run: python -m py_compile tools/corpus-fetcher/fetch_arxiv.py

      - name: Import smoke test
        # Ensures the module loads and the CLI surface is intact. We
        # don't hit the arXiv API from CI — that's a Phase 4.3 manual
        # benchmark, not a gate.
        run: |
          python -c "import sys; sys.path.insert(0, 'tools/corpus-fetcher'); import fetch_arxiv; assert hasattr(fetch_arxiv, 'main')"

      - name: --help runs
        run: python tools/corpus-fetcher/fetch_arxiv.py --help

  markdown-lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint actively-maintained docs (Phase 4.6.9)
        # Spec files in spec/ + docs/ + legacy/ are excluded via
        # .markdownlintignore. The config (.markdownlint.json)
        # caps line-length at 120 cols (with table/code/heading
        # exemptions) and turns off cosmetic rules whose
        # pre-existing violations would require a separate
        # focused pass. Going forward, regressions on the rules
        # that ARE on (line-length, duplicate-headings,
        # inline-html scope) fail CI directly.
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            README.md
            CONTRIBUTING.md
            CHANGELOG.md
