name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  validate-typescript:
    name: Validate TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TypeScript + project deps
        run: |
          cd implementations/typescript
          npm install

      - name: Type check
        run: |
          cd implementations/typescript
          npx tsc --noEmit

  test-typescript:
    name: TypeScript Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test deps (vitest + jszip)
        run: |
          cd implementations/typescript
          npm install

      - name: Run unit tests
        run: |
          cd implementations/typescript
          npm test

  validate-python:
    name: Validate Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check
        run: python -m py_compile implementations/python/mdx_format.py

      - name: Run example generator
        run: |
          cd implementations/python
          python mdx_format.py

      - name: Verify output
        run: |
          cd implementations/python
          test -f example-document.mdx
          unzip -t example-document.mdx

  validate-examples:
    name: Validate Example Documents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify example MDX structure
        run: |
          cd examples
          for mdx in *.mdx; do
            echo "Validating $mdx..."
            unzip -t "$mdx"
            unzip -p "$mdx" manifest.json | python -m json.tool > /dev/null
            unzip -p "$mdx" document.md > /dev/null
            echo "$mdx is valid"
          done

  validate-v11-examples:
    name: Validate v1.1 Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate v1.1 examples
        run: |
          cd implementations/python
          python create_v11_examples.py

      - name: Verify v1.1 examples
        run: |
          cd examples
          for mdx in alignment-*.mdx technical-doc.mdx; do
            if [ -f "$mdx" ]; then
              echo "Validating v1.1 example: $mdx..."
              unzip -t "$mdx"
              # Check for v1.1 manifest version
              version=$(unzip -p "$mdx" manifest.json | python -c "import sys,json; print(json.load(sys.stdin).get('mdx_version', '1.0.0'))")
              echo "  MDX Version: $version"
              # Verify has alignment extensions
              extensions=$(unzip -p "$mdx" manifest.json | python -c "import sys,json; exts=json.load(sys.stdin).get('content',{}).get('extensions',[]); print(','.join(exts))")
              echo "  Extensions: $extensions"
              echo "$mdx is valid"
            fi
          done

      - name: Verify alignment test files
        run: |
          cd tests/alignment
          for md in *.md; do
            echo "Checking test file: $md"
            test -f "$md"
          done
          echo "All test files present"

      - name: Run alignment fixture validator
        run: python tests/alignment/validate_fixtures.py

      - name: Run reference alignment parser conformance tests
        run: python tests/alignment/test_parser.py

  validate-v20-examples:
    name: Validate v2.0 Examples and Parser
    runs-on: ubuntu-latest
    needs: validate-json-schema
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Generate comprehensive v2.0 example
        run: python implementations/python/create_v20_example.py

      - name: Validate comprehensive v2.0 manifest against v2.0 schema
        run: |
          unzip -p examples/v2/comprehensive.mdx manifest.json > /tmp/v2_manifest.json
          ajv validate -s spec/manifest-v2.schema.json -d /tmp/v2_manifest.json --spec=draft2020 -c ajv-formats

      - name: Validate v2.0 reference profile JSONs parse
        run: |
          python -c "import json; [print(p, '→', json.load(open(p))['name']) for p in ['spec/profiles/scientific-paper-v1.json', 'spec/profiles/api-reference-v1.json']]"

      - name: Run v2.0 parser conformance tests
        run: python tests/v2.0/test_parser_v20.py

      - name: Verify archive ordering (§10.2)
        run: |
          first=$(unzip -l examples/v2/comprehensive.mdx | awk 'NR==4 {print $4}')
          if [ "$first" != "manifest.json" ]; then
            echo "ERROR: First entry is '$first', expected 'manifest.json' per §10.2"
            exit 1
          fi
          echo "Archive ordering OK (manifest.json is first entry)"

  validate-cli:
    name: Validate CLI Tool
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI dependencies
        run: |
          cd cli
          npm install

      - name: Test CLI commands
        run: |
          cd cli
          # Test info command
          node src/index.js info ../examples/example-document.mdx
          # Test validate command
          node src/index.js validate ../examples/example-document.mdx
          # Test extract command
          node src/index.js extract ../examples/example-document.mdx -f
          # Verify extracted files
          test -f example-document-extracted/manifest.json
          test -f example-document-extracted/document.md

  validate-json-schema:
    name: Validate JSON Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Validate v1.1 schema syntax
        run: ajv compile -s spec/manifest.schema.json --spec=draft2020 -c ajv-formats

      - name: Validate v2.0 schema syntax
        run: ajv compile -s spec/manifest-v2.schema.json --spec=draft2020 -c ajv-formats

      - name: Validate example manifest against v1.1 schema
        run: |
          cd examples
          unzip -p example-document.mdx manifest.json > manifest.json
          ajv validate -s ../spec/manifest.schema.json -d manifest.json --spec=draft2020 -c ajv-formats || echo "v1.1 schema validation completed with warnings"

      - name: Validate example manifest against v2.0 schema (backward compat)
        run: |
          cd examples
          # Regenerate manifest from the example MDX
          unzip -p example-document.mdx manifest.json > manifest.json
          ajv validate -s ../spec/manifest-v2.schema.json -d manifest.json --spec=draft2020 -c ajv-formats || echo "v2.0 schema validation completed with warnings"

  markdown-lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint specification
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            spec/*.md
            README.md
            CONTRIBUTING.md
            CHANGELOG.md
        continue-on-error: true
