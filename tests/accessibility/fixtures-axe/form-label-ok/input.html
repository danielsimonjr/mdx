<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Form label OK fixture</title></head>
<body>
  <main>
    <h1>Search form with labeled input</h1>
    <form>
      <label for="q">Search the archive</label>
      <input type="text" id="q" placeholder="Search...">
      <button type="submit">Go</button>
    </form>
  </main>
</body>
</html>
