<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Contrast fixture</title></head>
<body>
  <main>
    <h1>Body text below has insufficient contrast</h1>
    <p style="color:#aaa;background:#fff">
      This paragraph uses #aaa on white — contrast ratio ≈ 2.85:1,
      well below WCAG 2.2 AA's 4.5:1 minimum for body text.
    </p>
  </main>
</body>
</html>
