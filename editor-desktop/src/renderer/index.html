<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' blob: data:; style-src 'self' 'unsafe-inline'; script-src 'self';"/>
  <title>MDZ Editor</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; line-height: 1.5; }
    header { display: flex; align-items: center; gap: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid #ddd; }
    .archive-title { font-size: 1.25rem; font-weight: 600; }
    .archive-path { color: #666; font-size: 0.85rem; font-family: ui-monospace, monospace; }
    button { padding: 0.4rem 0.8rem; background: #1d4ed8; color: white; border: none; border-radius: 4px; cursor: pointer; }
    main { padding-top: 1rem; }
    pre { background: #f5f5f5; padding: 1rem; border-radius: 4px; overflow-x: auto; }
    .empty { color: #888; font-style: italic; }
    @media (prefers-color-scheme: dark) {
      body { background: #0a0a0a; color: #f5f5f5; }
      header { border-color: #333; }
      .archive-path { color: #888; }
      pre { background: #1a1a1a; }
    }
  </style>
</head>
<body>
  <header>
    <button id="open-btn">Open MDZ…</button>
    <span id="title" class="archive-title empty">No archive open.</span>
    <span id="path" class="archive-path"></span>
  </header>
  <main>
    <pre id="content"></pre>
  </main>
  <script type="module" src="./index.ts"></script>
</body>
</html>
