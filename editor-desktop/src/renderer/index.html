<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <!--
    CSP: relaxed to allow the Pyodide WASM bundle to load from
    cdn.jsdelivr.net (Phase 2.3b.1.2). The kernel is opt-in — users
    only trigger the CDN load by clicking "Run Python cells" — but
    the CSP has to permit it ahead of time. `wasm-unsafe-eval` is
    required because Pyodide's WebAssembly.compile path counts as
    eval under CSP3. See Phase 2.3b.1 ROADMAP entry for the security
    rationale.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' blob: data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; connect-src 'self' https://cdn.jsdelivr.net; worker-src 'self' blob:;"/>
  <title>MDZ Editor</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr auto; grid-template-columns: 1fr 220px; }
    header { grid-column: 1 / -1; }
    .pane { grid-column: 1; }
    footer.status-bar {
      grid-column: 1 / -1; padding: 0.25rem 0.75rem; border-top: 1px solid #ddd;
      font-size: 0.8rem; color: #666; display: flex; gap: 1rem; align-items: center;
    }
    footer.status-bar .a11y-status.has-issues { color: #b45309; cursor: pointer; }
    footer.status-bar .a11y-status.ok { color: #15803d; }
    footer.status-bar .a11y-panel {
      position: absolute; bottom: 2rem; left: 0.75rem; right: 0.75rem; max-width: 640px;
      background: white; border: 1px solid #ccc; border-radius: 4px; padding: 0.75rem;
      max-height: 40vh; overflow-y: auto; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }
    footer.status-bar .a11y-panel ul { list-style: none; padding: 0; margin: 0; font-family: ui-monospace, monospace; font-size: 0.78rem; }
    footer.status-bar .a11y-panel li { padding: 0.2rem 0; border-bottom: 1px solid #eee; }
    @media (prefers-color-scheme: dark) {
      footer.status-bar { border-color: #333; color: #888; }
      footer.status-bar .a11y-panel { background: #1a1a1a; border-color: #333; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5); }
      footer.status-bar .a11y-panel li { border-color: #2a2a2a; }
    }
    .asset-sidebar {
      grid-column: 2; grid-row: 2; border-left: 1px solid #ddd;
      display: flex; flex-direction: column; min-height: 0; overflow: hidden;
    }
    .asset-sidebar-header { padding: 0.5rem 0.75rem; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
    .asset-count { color: #666; font-size: 0.85rem; }
    .asset-dropzone {
      margin: 0.5rem; padding: 1rem 0.5rem; border: 2px dashed #ccc;
      border-radius: 4px; text-align: center; cursor: pointer; font-size: 0.85rem; color: #666;
    }
    .asset-dropzone.dragover { border-color: #1d4ed8; background: #eff6ff; color: #1d4ed8; }
    .asset-list { list-style: none; padding: 0 0.5rem; margin: 0; overflow-y: auto; flex: 1; min-height: 0; }
    .asset-list li {
      padding: 0.4rem 0.5rem; font-size: 0.85rem; border-radius: 3px;
      display: flex; justify-content: space-between; gap: 0.4rem; align-items: center;
    }
    .asset-list li:hover { background: #f5f5f5; }
    .asset-list .asset-path { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; font-family: ui-monospace, monospace; }
    .asset-list .asset-size { color: #888; font-size: 0.75rem; flex-shrink: 0; }
    .asset-list .asset-delete {
      background: none; border: none; color: #dc2626; cursor: pointer; padding: 0 0.2rem;
      font-size: 0.85rem;
    }
    @media (prefers-color-scheme: dark) {
      .asset-sidebar { border-color: #333; }
      .asset-sidebar-header { border-color: #333; }
      .asset-dropzone { border-color: #444; color: #999; }
      .asset-dropzone.dragover { border-color: #60a5fa; background: #1e3a8a; color: #dbeafe; }
      .asset-list li:hover { background: #1a1a1a; }
    }
    body-old { font-family: system-ui, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
    header { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-bottom: 1px solid #ddd; }
    .archive-title { font-size: 1rem; font-weight: 600; }
    .archive-path { color: #666; font-size: 0.8rem; font-family: ui-monospace, monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    button, .mode-toggle button {
      padding: 0.3rem 0.7rem; background: #1d4ed8; color: white; border: none;
      border-radius: 4px; cursor: pointer; font-size: 0.85rem;
    }
    .mode-toggle button { background: transparent; color: inherit; border: 1px solid #ccc; }
    .mode-toggle button[aria-pressed="true"] { background: #1d4ed8; color: white; border-color: #1d4ed8; }
    .mode-toggle { display: flex; gap: 0; }
    .mode-toggle button:not(:last-child) { border-top-right-radius: 0; border-bottom-right-radius: 0; }
    .mode-toggle button:not(:first-child) { border-top-left-radius: 0; border-bottom-left-radius: 0; margin-left: -1px; }
    .empty { color: #888; font-style: italic; }

    /* Pane layout — CSS classes mode-source / mode-preview / mode-split
       set at runtime by the editor-pane factory. Default split shows both. */
    .pane { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #ddd; overflow: hidden; }
    .pane.mode-source { grid-template-columns: 1fr 0fr; }
    .pane.mode-preview { grid-template-columns: 0fr 1fr; }
    .pane.mode-split { grid-template-columns: 1fr 1fr; }
    .pane > * { background: white; overflow: auto; min-width: 0; }
    .pane.mode-source .preview { display: none; }
    .pane.mode-preview .source { display: none; }
    .source { font-family: ui-monospace, monospace; font-size: 0.9rem; }
    .preview { padding: 1.5rem; line-height: 1.6; }
    .preview img { max-width: 100%; }

    /* CodeMirror styling — minimal; the editor brings its own. */
    .cm-editor { height: 100%; }
    .cm-scroller { overflow: auto; }

    /* Directive picker toolbar */
    .directive-toolbar { display: flex; gap: 0.25rem; }
    .directive-toolbar button { background: transparent; color: inherit; border: 1px solid #ccc; padding: 0.3rem 0.6rem; }
    .directive-toolbar button:hover:not([disabled]) { background: #eef2ff; color: #1d4ed8; border-color: #1d4ed8; }
    .directive-toolbar button[disabled] { opacity: 0.4; cursor: not-allowed; }
    @media (prefers-color-scheme: dark) {
      .directive-toolbar button { color: #f5f5f5; border-color: #333; }
      .directive-toolbar button:hover:not([disabled]) { background: #1e3a8a; color: #dbeafe; border-color: #60a5fa; }
    }

    /* Block-diff pane (Phase 2.3b.3.2) */
    .block-diff { font-family: ui-monospace, monospace; font-size: 0.85rem; line-height: 1.4; }
    .block-diff .block { border-left: 3px solid transparent; padding: 0.5rem 0.75rem; margin: 0.5rem 0; }
    .block-diff .block-equal { border-color: #ddd; opacity: 0.55; }
    .block-diff .block-added { border-color: #15803d; background: #ecfdf5; }
    .block-diff .block-removed { border-color: #b91c1c; background: #fef2f2; }
    .block-diff .block-modified { border-color: #b45309; background: #fffbeb; }
    .block-diff .block-label { margin: 0 0 0.35rem; font-size: 0.78rem; color: #555; font-weight: 600; }
    .block-diff pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
    .block-diff .line-diff .line { padding: 0 0.25rem; }
    .block-diff .line-removed { background: #fee2e2; color: #7f1d1d; }
    .block-diff .line-added { background: #dcfce7; color: #14532d; }
    .block-diff-empty { color: #888; padding: 1rem; text-align: center; }
    .diff-stats { font-family: ui-monospace, monospace; font-size: 0.85rem; padding: 0.4rem 0.75rem; border-bottom: 1px solid #ddd; background: #f9fafb; }
    @media (prefers-color-scheme: dark) {
      .block-diff .block-equal { border-color: #333; }
      .block-diff .block-added { background: #052e1a; }
      .block-diff .block-removed { background: #2d0a0a; }
      .block-diff .block-modified { background: #2a1c00; }
      .block-diff .line-removed { background: #4b1414; color: #fecaca; }
      .block-diff .line-added { background: #14361f; color: #bbf7d0; }
      .diff-stats { background: #0a0a0a; border-color: #333; }
    }
    .diff-modal { width: min(960px, 95vw); max-height: 85vh; padding: 0; overflow: hidden; display: flex; flex-direction: column; border: 1px solid #ccc; border-radius: 6px; }
    .diff-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0.75rem; border-bottom: 1px solid #ddd; gap: 0.5rem; }
    .diff-modal-header h3 { margin: 0; font-size: 1rem; }
    .diff-modal-body { overflow-y: auto; padding: 0.5rem 0.75rem; flex: 1; }
    .diff-modal-controls { display: flex; gap: 0.5rem; align-items: center; }
    .diff-modal-controls select { padding: 0.25rem 0.5rem; }

    /* Directive modal */
    .directive-modal { border: 1px solid #ccc; border-radius: 6px; padding: 1.25rem; min-width: 360px; max-width: 90vw; }
    .directive-modal::backdrop { background: rgba(0, 0, 0, 0.4); }
    .directive-modal-title { margin: 0 0 0.75rem; font-size: 1.05rem; }
    .directive-modal-fields { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 0.75rem; }
    .directive-modal-field { display: flex; flex-direction: column; gap: 0.2rem; font-size: 0.85rem; }
    .directive-modal-field input, .directive-modal-field select {
      padding: 0.35rem 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem;
      font-family: inherit;
    }
    .directive-modal-error { color: #dc2626; font-size: 0.85rem; margin: 0 0 0.5rem; }
    .directive-modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .directive-modal .cancel-btn { background: transparent; color: inherit; border: 1px solid #ccc; }
    @media (prefers-color-scheme: dark) {
      .directive-modal { background: #181818; border-color: #444; color: #f5f5f5; }
      .directive-modal-field input, .directive-modal-field select { background: #0a0a0a; color: #f5f5f5; border-color: #333; }
      .directive-modal .cancel-btn { color: #f5f5f5; border-color: #444; }
    }

    @media (prefers-color-scheme: dark) {
      body { background: #0a0a0a; color: #f5f5f5; }
      header { border-color: #333; }
      .archive-path { color: #888; }
      .pane { background: #222; }
      .pane > * { background: #111; }
      .mode-toggle button { color: #f5f5f5; border-color: #333; }
    }
  </style>
</head>
<body>
  <header>
    <button id="open-btn">Open MDZ…</button>
    <button id="save-btn">Save</button>
    <span id="title" class="archive-title empty">No archive open.</span>
    <span id="path" class="archive-path"></span>
    <span id="modified-indicator" hidden aria-label="modified" title="Unsaved changes">●</span>
    <div class="directive-toolbar" role="group" aria-label="Insert directive">
      <button id="picker-cell" type="button" disabled title="Insert ::cell">::cell</button>
      <button id="picker-include" type="button" disabled title="Insert ::include">::include</button>
      <button id="picker-fig" type="button" disabled title="Insert ::fig / ::eq / ::tab">::fig</button>
      <button id="picker-cite" type="button" disabled title="Insert ::cite">::cite</button>
      <button id="picker-video" type="button" disabled title="Insert ::video">::video</button>
      <button id="picker-audio" type="button" disabled title="Insert ::audio">::audio</button>
      <button id="picker-model" type="button" disabled title="Insert ::model">::model</button>
      <button id="picker-embed" type="button" disabled title="Insert ::embed">::embed</button>
      <button id="picker-data" type="button" disabled title="Insert ::data">::data</button>
    </div>
    <button id="generate-variants-btn" type="button" disabled title="Generate AVIF/WebP variants for staged images">Generate variants</button>
    <button id="run-cells-btn" type="button" disabled title="Execute every Python ::cell and insert ::output blocks">Run Python cells</button>
    <button id="diff-btn" type="button" disabled title="Compare current document against a saved snapshot">Compare versions</button>
    <div class="mode-toggle" role="group" aria-label="View mode">
      <button id="mode-source" aria-pressed="false">Source</button>
      <button id="mode-split" aria-pressed="true">Split</button>
      <button id="mode-preview" aria-pressed="false">Preview</button>
    </div>
  </header>
  <div class="pane mode-split" id="pane">
    <div class="source" id="source"></div>
    <div class="preview" id="preview">
      <p class="empty">Open an MDZ archive to start editing.</p>
    </div>
  </div>
  <aside id="asset-sidebar" class="asset-sidebar" aria-label="Assets">
    <div class="asset-sidebar-header">
      <strong>Assets</strong>
      <span id="asset-count" class="asset-count">0</span>
    </div>
    <div id="asset-dropzone" class="asset-dropzone" aria-label="Drop files to add as archive assets">
      <p>Drag files here to add as archive assets, or click to browse.</p>
      <input type="file" id="asset-file-input" multiple hidden/>
    </div>
    <ul id="asset-list" class="asset-list" role="list"></ul>
  </aside>
  <footer class="status-bar" role="contentinfo">
    <span id="a11y-status" class="a11y-status" aria-live="polite" tabindex="0">Accessibility: —</span>
    <div id="a11y-panel" class="a11y-panel" hidden role="region" aria-label="Accessibility issues"></div>
  </footer>
  <script type="module" src="./index.ts"></script>
</body>
</html>
