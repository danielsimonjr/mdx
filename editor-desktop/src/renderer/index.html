<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' blob: data:; style-src 'self' 'unsafe-inline'; script-src 'self';"/>
  <title>MDZ Editor</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; height: 100vh; display: grid; grid-template-rows: auto 1fr; grid-template-columns: 1fr 220px; }
    header { grid-column: 1 / -1; }
    .pane { grid-column: 1; }
    .asset-sidebar {
      grid-column: 2; grid-row: 2; border-left: 1px solid #ddd;
      display: flex; flex-direction: column; min-height: 0; overflow: hidden;
    }
    .asset-sidebar-header { padding: 0.5rem 0.75rem; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
    .asset-count { color: #666; font-size: 0.85rem; }
    .asset-dropzone {
      margin: 0.5rem; padding: 1rem 0.5rem; border: 2px dashed #ccc;
      border-radius: 4px; text-align: center; cursor: pointer; font-size: 0.85rem; color: #666;
    }
    .asset-dropzone.dragover { border-color: #1d4ed8; background: #eff6ff; color: #1d4ed8; }
    .asset-list { list-style: none; padding: 0 0.5rem; margin: 0; overflow-y: auto; flex: 1; min-height: 0; }
    .asset-list li {
      padding: 0.4rem 0.5rem; font-size: 0.85rem; border-radius: 3px;
      display: flex; justify-content: space-between; gap: 0.4rem; align-items: center;
    }
    .asset-list li:hover { background: #f5f5f5; }
    .asset-list .asset-path { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; font-family: ui-monospace, monospace; }
    .asset-list .asset-size { color: #888; font-size: 0.75rem; flex-shrink: 0; }
    .asset-list .asset-delete {
      background: none; border: none; color: #dc2626; cursor: pointer; padding: 0 0.2rem;
      font-size: 0.85rem;
    }
    @media (prefers-color-scheme: dark) {
      .asset-sidebar { border-color: #333; }
      .asset-sidebar-header { border-color: #333; }
      .asset-dropzone { border-color: #444; color: #999; }
      .asset-dropzone.dragover { border-color: #60a5fa; background: #1e3a8a; color: #dbeafe; }
      .asset-list li:hover { background: #1a1a1a; }
    }
    body-old { font-family: system-ui, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
    header { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-bottom: 1px solid #ddd; }
    .archive-title { font-size: 1rem; font-weight: 600; }
    .archive-path { color: #666; font-size: 0.8rem; font-family: ui-monospace, monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    button, .mode-toggle button {
      padding: 0.3rem 0.7rem; background: #1d4ed8; color: white; border: none;
      border-radius: 4px; cursor: pointer; font-size: 0.85rem;
    }
    .mode-toggle button { background: transparent; color: inherit; border: 1px solid #ccc; }
    .mode-toggle button[aria-pressed="true"] { background: #1d4ed8; color: white; border-color: #1d4ed8; }
    .mode-toggle { display: flex; gap: 0; }
    .mode-toggle button:not(:last-child) { border-top-right-radius: 0; border-bottom-right-radius: 0; }
    .mode-toggle button:not(:first-child) { border-top-left-radius: 0; border-bottom-left-radius: 0; margin-left: -1px; }
    .empty { color: #888; font-style: italic; }

    /* Pane layout — CSS classes mode-source / mode-preview / mode-split
       set at runtime by the editor-pane factory. Default split shows both. */
    .pane { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #ddd; overflow: hidden; }
    .pane.mode-source { grid-template-columns: 1fr 0fr; }
    .pane.mode-preview { grid-template-columns: 0fr 1fr; }
    .pane.mode-split { grid-template-columns: 1fr 1fr; }
    .pane > * { background: white; overflow: auto; min-width: 0; }
    .pane.mode-source .preview { display: none; }
    .pane.mode-preview .source { display: none; }
    .source { font-family: ui-monospace, monospace; font-size: 0.9rem; }
    .preview { padding: 1.5rem; line-height: 1.6; }
    .preview img { max-width: 100%; }

    /* CodeMirror styling — minimal; the editor brings its own. */
    .cm-editor { height: 100%; }
    .cm-scroller { overflow: auto; }

    @media (prefers-color-scheme: dark) {
      body { background: #0a0a0a; color: #f5f5f5; }
      header { border-color: #333; }
      .archive-path { color: #888; }
      .pane { background: #222; }
      .pane > * { background: #111; }
      .mode-toggle button { color: #f5f5f5; border-color: #333; }
    }
  </style>
</head>
<body>
  <header>
    <button id="open-btn">Open MDZ…</button>
    <button id="save-btn">Save</button>
    <span id="title" class="archive-title empty">No archive open.</span>
    <span id="path" class="archive-path"></span>
    <span id="modified-indicator" hidden aria-label="modified" title="Unsaved changes">●</span>
    <div class="mode-toggle" role="group" aria-label="View mode">
      <button id="mode-source" aria-pressed="false">Source</button>
      <button id="mode-split" aria-pressed="true">Split</button>
      <button id="mode-preview" aria-pressed="false">Preview</button>
    </div>
  </header>
  <div class="pane mode-split" id="pane">
    <div class="source" id="source"></div>
    <div class="preview" id="preview">
      <p class="empty">Open an MDZ archive to start editing.</p>
    </div>
  </div>
  <aside id="asset-sidebar" class="asset-sidebar" aria-label="Assets">
    <div class="asset-sidebar-header">
      <strong>Assets</strong>
      <span id="asset-count" class="asset-count">0</span>
    </div>
    <div id="asset-dropzone" class="asset-dropzone" aria-label="Drop files to add as archive assets">
      <p>Drag files here to add as archive assets, or click to browse.</p>
      <input type="file" id="asset-file-input" multiple hidden/>
    </div>
    <ul id="asset-list" class="asset-list" role="list"></ul>
  </aside>
  <script type="module" src="./index.ts"></script>
</body>
</html>
